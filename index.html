<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="기한관리">
<title>기한 관리</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;background:#f5f5f5;color:#1a1a1a;min-height:100vh}
.wrap{max-width:960px;margin:0 auto;padding:1.25rem 1rem}
.top{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:10px}
h2{font-size:20px;font-weight:600;color:#1a1a1a}
.sub{font-size:12px;color:#888;margin-left:8px;font-weight:400}
.btn{background:#fff;border:1px solid #ddd;border-radius:8px;padding:7px 14px;font-size:13px;cursor:pointer;color:#1a1a1a}
.btn:hover{background:#f5f5f5}
.btn:active{transform:scale(0.98)}
.btn-primary{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.btn-primary:hover{background:#333}
.btn-sync{background:#fff;border:1px solid #1D9E75;color:#1D9E75;border-radius:8px;padding:7px 14px;font-size:13px;cursor:pointer}
.btn-sync:hover{background:#E1F5EE}
.btn-sync:disabled{opacity:0.4;cursor:not-allowed}
.sync-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.sync-status{font-size:12px;color:#888;display:flex;align-items:center;gap:5px}
.dot{width:7px;height:7px;border-radius:50%;background:#ccc;display:inline-block;flex-shrink:0}
.dot.ok{background:#1D9E75}.dot.err{background:#E24B4A}.dot.loading{background:#BA7517;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:1.25rem}
.stat{background:#fff;border-radius:10px;padding:1rem;text-align:center;border:1px solid #eee}
.stat-label{font-size:11px;color:#888;margin-bottom:4px}
.stat-num{font-size:24px;font-weight:600}
.c-red{color:#E24B4A}.c-amber{color:#BA7517}.c-blue{color:#185FA5}.c-gray{color:#aaa}
.filters{display:flex;gap:6px;margin-bottom:1rem;flex-wrap:wrap;align-items:center}
.chip{padding:5px 12px;border-radius:20px;font-size:12px;border:1px solid #ddd;cursor:pointer;background:#fff;color:#666}
.chip.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.search{padding:7px 11px;border:1px solid #ddd;border-radius:8px;font-size:13px;background:#fff;color:#1a1a1a;width:190px}
.search:focus{outline:none;border-color:#888}
.table-wrap{background:#fff;border-radius:12px;border:1px solid #eee;overflow:hidden;overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:680px}
thead th{text-align:left;padding:10px 12px;font-weight:500;font-size:11px;color:#888;border-bottom:1px solid #eee;background:#fafafa;white-space:nowrap}
tbody tr{border-bottom:1px solid #f0f0f0}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:#fafafa}
td{padding:11px 12px;vertical-align:middle}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap}
.b-red{background:#FCEBEB;color:#A32D2D}
.b-amber{background:#FAEEDA;color:#854F0B}
.b-blue{background:#E6F1FB;color:#185FA5}
.b-green{background:#EAF3DE;color:#3B6D11}
.b-purple{background:#EEEDFE;color:#3C3489}
.b-gray{background:#F1EFE8;color:#5F5E5A}
.d-red{color:#E24B4A;font-weight:600}
.d-amber{color:#BA7517;font-weight:600}
.done-row{opacity:0.38}
.action-btn{background:#fff;border:1px solid #e0e0e0;border-radius:5px;padding:3px 9px;font-size:11px;cursor:pointer;color:#555}
.action-btn:hover{background:#EAF3DE;color:#3B6D11;border-color:#3B6D11}
.del-btn{background:transparent;border:none;cursor:pointer;color:#ccc;padding:3px 6px;font-size:15px;line-height:1}
.del-btn:hover{color:#E24B4A}
.ref-cell{font-family:'SF Mono',Menlo,monospace;font-size:11px;color:#888}
.empty{text-align:center;padding:3.5rem;color:#aaa;font-size:14px}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:100;align-items:center;justify-content:center;padding:1rem}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:16px;padding:1.5rem;width:440px;max-width:100%;border:1px solid #eee;max-height:90vh;overflow-y:auto}
.modal h3{font-size:17px;font-weight:600;margin-bottom:1.1rem}
.form-row{margin-bottom:12px}
.form-row label{display:block;font-size:12px;color:#666;margin-bottom:4px;font-weight:500}
.form-row input,.form-row select{width:100%;padding:9px 11px;border:1px solid #ddd;border-radius:8px;font-size:14px;background:#fff;color:#1a1a1a;-webkit-appearance:none}
.form-row input:focus,.form-row select:focus{outline:none;border-color:#888}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:1rem}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:11px 22px;border-radius:10px;font-size:13px;z-index:200;opacity:0;transition:opacity 0.25s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
@media(max-width:600px){
.stats{grid-template-columns:repeat(2,1fr)}
.search{width:130px}
h2{font-size:17px}
}
</style>
</head>
<body>
<div class="wrap">
<div class="top">
<div style="display:flex;align-items:baseline">
<h2>기한 관리<span class="sub">26년 3월 기준</span></h2>
</div>
<div class="sync-row">
<div class="sync-status"><span class="dot loading" id="sync-dot"></span><span id="sync-label">연결 중...</span></div>
<button class="btn-sync" id="sync-btn" onclick="syncFromSheet()" disabled>새로고침</button>
<button class="btn btn-primary" onclick="openModal()">+ 추가</button>
</div>
</div>
<div class="stats">
<div class="stat"><div class="stat-label">D-7 이내</div><div class="stat-num c-red" id="s-urgent">0</div></div>
<div class="stat"><div class="stat-label">D-30 이내</div><div class="stat-num c-amber" id="s-soon">0</div></div>
<div class="stat"><div class="stat-label">전체 진행중</div><div class="stat-num c-blue" id="s-total">0</div></div>
<div class="stat"><div class="stat-label">완료</div><div class="stat-num c-gray" id="s-done">0</div></div>
</div>
<div class="filters">
<button class="chip active" data-f="전체" onclick="setFilter(this)">전체</button>
<button class="chip" data-f="국내OA" onclick="setFilter(this)">국내OA</button>
<button class="chip" data-f="해외OA" onclick="setFilter(this)">해외OA</button>
<button class="chip" data-f="등록검토" onclick="setFilter(this)">등록검토</button>
<button class="chip" data-f="국내분할" onclick="setFilter(this)">국내분할</button>
<input class="search" id="search" placeholder="REF 또는 담당자 검색..." oninput="render()">
</div>
<div class="table-wrap">
<table>
<thead><tr>
<th>LGE REF</th><th>업무유형</th><th>업무기한</th><th>마감일</th><th>연장</th><th>담당자</th><th>D-day</th><th>상태</th><th></th>
</tr></thead>
<tbody id="tbody"></tbody>
</table>
<div id="empty" class="empty" style="display:none">항목이 없습니다.</div>
</div>
</div>
<div class="modal-bg" id="modal-bg">
<div class="modal">
<h3>기한 추가</h3>
<div class="form-row"><label>LGE REF</label><input id="f-ref" placeholder="예: 19LWW255KR01"></div>
<div class="form-row"><label>업무유형</label>
<select id="f-type">
<option>국내OA</option><option>국내신건</option><option>자진보정</option>
<option>해외OA</option><option>등록검토</option><option>국내분할</option>
</select>
</div>
<div class="form-row"><label>업무기한</label><input type="date" id="f-work"></div>
<div class="form-row"><label>마감일 (법정기한)</label><input type="date" id="f-dead"></div>
<div class="form-row"><label>연장</label><input id="f-ext" placeholder="예: 2개월"></div>
<div class="form-row"><label>담당자</label><input id="f-person" placeholder="예: 손구영 책임님"></div>
<div class="modal-btns">
<button class="btn" onclick="closeModal()">취소</button>
<button class="btn btn-primary" onclick="addItem()">추가</button>
</div>
</div>
</div>
<div class="toast" id="toast"></div>
<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbyIJo-Us95YZ0m5XGCkRiofb4eWA5YOBh0YVYJMvIzlidAFqt1CpKZ-FaChhhS-iu4oxg/exec';
const SOURCE = [{"ref":"19LWW255KR01D1D1","type":"국내OA","workDate":"2026-02-23","deadDate":"2026-04-23","ext":"","person":"손구영 책임님","done":false},{"ref":"20LWV082KR01D2","type":"국내OA","workDate":"2026-02-13","deadDate":"2026-04-02","ext":"","person":"김민철 책임님","done":false},{"ref":"20LWV082KR01D1","type":"국내OA","workDate":"2026-02-13","deadDate":"2026-04-02","ext":"","person":"김민철 책임님","done":false},{"ref":"19LWW256KR01D1D1","type":"국내OA","workDate":"2026-02-24","deadDate":"2026-04-14","ext":"","person":"손구영 책임님","done":false},{"ref":"19REF165KR01D1","type":"국내OA","workDate":"2026-04-10","deadDate":"2026-06-11","ext":"","person":"권영철 책임님","done":false},{"ref":"19LWW254KR01D1D1","type":"국내OA","workDate":"2026-05-14","deadDate":"2026-07-18","ext":"","person":"손구영 책임님","done":false},{"ref":"19LWW251EP03D1","type":"해외OA","workDate":"2025-12-11","deadDate":"2026-05-12","ext":"","person":"손구영 책임님","done":false},{"ref":"19LWW254EP03D1D1","type":"해외OA","workDate":"2026-01-07","deadDate":"2026-05-26","ext":"","person":"손구영 책임님","done":false},{"ref":"18REF068EP03D1D1","type":"해외OA","workDate":"2026-01-09","deadDate":"2026-06-17","ext":"","person":"권영철 책임님","done":false},{"ref":"19LWW254EP03D1D2","type":"해외OA","workDate":"","deadDate":"2026-06-03","ext":"","person":"손구영 책임님","done":false},{"ref":"20LWW069EP03D1","type":"해외OA","workDate":"2026-01-28","deadDate":"2026-06-17","ext":"","person":"손구영 책임님","done":false},{"ref":"20LWW069EP03D2","type":"해외OA","workDate":"2026-01-28","deadDate":"2026-06-24","ext":"","person":"손구영 책임님","done":false},{"ref":"20LWW069EP03D3","type":"해외OA","workDate":"2026-01-28","deadDate":"2026-06-17","ext":"","person":"손구영 책임님","done":false},{"ref":"20LWW069EP03D4","type":"해외OA","workDate":"2026-01-28","deadDate":"2026-06-17","ext":"","person":"손구영 책임님","done":false},{"ref":"20LWW069EP03D5","type":"해외OA","workDate":"2026-01-28","deadDate":"2026-06-17","ext":"","person":"손구영 책임님","done":false},{"ref":"20LWW069EP03D6","type":"해외OA","workDate":"2026-01-28","deadDate":"2026-06-17","ext":"","person":"손구영 책임님","done":false},{"ref":"19LWW257EP04D1","type":"해외OA","workDate":"2026-01-28","deadDate":"2026-06-17","ext":"","person":"손구영 책임님","done":false},{"ref":"14FREF018EP03D1","type":"해외OA","workDate":"2026-02-04","deadDate":"2026-04-05","ext":"","person":"권영철 책임님","done":false},{"ref":"25REF190EP03","type":"해외OA","workDate":"2026-03-03","deadDate":"2026-09-11","ext":"","person":"김도훈 책임님","done":false},{"ref":"19LWW245CN04D1","type":"해외OA","workDate":"2026-03-27","deadDate":"2026-04-24","ext":"","person":"손구영 책임님","done":false},{"ref":"19LWW260CN04D1","type":"해외OA","workDate":"2026-03-21","deadDate":"2026-04-18","ext":"","person":"손구영 책임님","done":false},{"ref":"19LWW260CN04D2","type":"해외OA","workDate":"2026-03-21","deadDate":"2026-04-18","ext":"","person":"손구영 책임님","done":false},{"ref":"22LWP090US02","type":"해외OA","workDate":"2026-03-25","deadDate":"2026-04-22","ext":"","person":"배원직 책임님","done":false},{"ref":"24REF176EP03","type":"해외OA","workDate":"2026-04-09","deadDate":"2026-07-10","ext":"","person":"김도훈 책임님","done":false},{"ref":"25REF131EP03","type":"해외OA","workDate":"2026-04-09","deadDate":"2026-07-10","ext":"","person":"김도훈 책임님","done":false},{"ref":"19LWW253US03C2","type":"해외OA","workDate":"2026-04-04","deadDate":"2026-05-02","ext":"","person":"손구영 책임님","done":false},{"ref":"19LWW254EP03D1","type":"해외OA","workDate":"2026-04-20","deadDate":"2026-06-02","ext":"","person":"손구영 책임님","done":false},{"ref":"19LWW258CN04D1","type":"해외OA","workDate":"2026-05-12","deadDate":"2026-06-11","ext":"","person":"손구영 책임님","done":false},{"ref":"19LWW267CN05D2","type":"해외OA","workDate":"2026-05-06","deadDate":"2026-06-03","ext":"","person":"손구영 책임님","done":false},{"ref":"19LWW267CN05D3","type":"해외OA","workDate":"2026-05-07","deadDate":"2026-06-04","ext":"","person":"손구영 책임님","done":false},{"ref":"22LWP090EP04","type":"해외OA","workDate":"2026-05-13","deadDate":"2026-07-02","ext":"","person":"배원직 책임님","done":false},{"ref":"19LWW254US02C1","type":"해외OA","workDate":"2026-05-14","deadDate":"2026-06-11","ext":"","person":"손구영 책임님","done":false},{"ref":"19LWW253US03C1","type":"등록검토","workDate":"2026-01-16","deadDate":"","ext":"","person":"","done":false},{"ref":"25LWP035EP03","type":"등록검토","workDate":"2026-01-18","deadDate":"2025-03-18","ext":"","person":"문중석 선임님","done":false},{"ref":"25LWP035US02","type":"등록검토","workDate":"2026-01-18","deadDate":"2025-03-18","ext":"","person":"문중석 선임님","done":false},{"ref":"25LWP035CN04","type":"등록검토","workDate":"2026-01-18","deadDate":"2025-03-18","ext":"","person":"문중석 선임님","done":false},{"ref":"25LWP036EP03","type":"등록검토","workDate":"2026-01-18","deadDate":"2025-03-18","ext":"","person":"문중석 선임님","done":false},{"ref":"25LWP036US02","type":"등록검토","workDate":"2026-01-18","deadDate":"2025-03-18","ext":"","person":"문중석 선임님","done":false},{"ref":"25LWP036CN04","type":"등록검토","workDate":"2026-01-18","deadDate":"2025-03-18","ext":"","person":"문중석 선임님","done":false},{"ref":"19LWW253EP04D1D1","type":"국내분할","workDate":"2026-01-23","deadDate":"2026-05-23","ext":"","person":"손구영 책임님","done":false}];
let items = [];
let filter = '전체';
function setStatus(state, msg) {
document.getElementById('sync-dot').className = 'dot ' + state;
document.getElementById('sync-label').textContent = msg;
document.getElementById('sync-btn').disabled = (state === 'loading');
}
async function syncFromSheet() {
setStatus('loading', '불러오는 중...');
try {
const res = await fetch(GAS_URL + '?action=getAll');
const data = await res.json();
if (data.error) throw new Error(data.error);
if (data.items && data.items.length > 0) {
items = data.items.map(function(r) {
return {
ref: r.ref||'', type: r.type||'국내OA',
workDate: r.workDate||'', deadDate: r.deadDate||'',
ext: r.ext||'', person: r.person||'',
done: r.done==='TRUE'||r.done===true||r.done==='true'
};
});
setStatus('ok', '구글 시트 연동됨');
showToast('시트에서 '+items.length+'건 불러왔어요');
} else {
items = SOURCE.map(function(d){ return Object.assign({},d); });
await pushToSheet();
setStatus('ok', '구글 시트 연동됨');
showToast('초기 데이터를 시트에 저장했어요');
}
render();
} catch(e) {
setStatus('err', '연동 실패');
items = SOURCE.map(function(d){ return Object.assign({},d); });
render();
showToast('시트 연결 실패 — 로컬 데이터로 표시해요');
}
}
async function pushToSheet() {
setStatus('loading', '저장 중...');
try {
const res = await fetch(GAS_URL, {
method: 'POST',
headers: {'Content-Type': 'text/plain'},
body: JSON.stringify({action: 'save', data: items})
});
const data = await res.json();
if (data.error) throw new Error(data.error);
setStatus('ok', '구글 시트 연동됨');
} catch(e) {
setStatus('err', '저장 실패');
showToast('저장 실패. 다시 시도해주세요.');
}
}
function today() { const d=new Date(); d.setHours(0,0,0,0); return d; }
function dday(ds) {
if(!ds) return null;
const t=today(), tgt=new Date(ds); tgt.setHours(0,0,0,0);
return Math.round((tgt-t)/86400000);
}
function ddLabel(d) { if(d===null) return '-'; if(d<0) return 'D+'+Math.abs(d); if(d===0) return 'D-day'; return 'D-'+d; }
function ddClass(d) { if(d===null||d<0) return ''; if(d<=7) return 'd-red'; if(d<=30) return 'd-amber'; return ''; }
function fmtDate(ds) {
if(!ds) return '-';
try { const d=new Date(ds); return (d.getMonth()+1)+'월 '+d.getDate()+'일'; } catch(e){ return ds; }
}
function typeBadge(t) {
const m={'국내OA':'b-red','국내신건':'b-blue','자진보정':'b-green','해외OA':'b-amber','등록검토':'b-purple','국내분할':'b-gray'};
return '<span class="badge '+(m[t]||'b-gray')+'">'+t+'</span>';
}
function showToast(msg) {
const el=document.getElementById('toast');
el.textContent=msg; el.classList.add('show');
setTimeout(function(){ el.classList.remove('show'); },2500);
}
function render() {
const q=(document.getElementById('search').value||'').toLowerCase();
let visible = filter==='전체' ? items.slice() : items.filter(function(i){ return i.type===filter; });
if(q) visible=visible.filter(function(i){ return (i.ref||'').toLowerCase().includes(q)||(i.person||'').toLowerCase().includes(q); });
const active=items.filter(function(i){ return !i.done; });
document.getElementById('s-urgent').textContent=active.filter(function(i){ const d=dday(i.deadDate||i.workDate); return d!==null&&d>=0&&d<=7; }).length;
document.getElementById('s-soon').textContent=active.filter(function(i){ const d=dday(i.deadDate||i.workDate); return d!==null&&d>=0&&d<=30; }).length;
document.getElementById('s-total').textContent=active.length;
document.getElementById('s-done').textContent=items.filter(function(i){ return i.done; }).length;
const empty=document.getElementById('empty'), tb=document.getElementById('tbody');
if(visible.length===0){ tb.innerHTML=''; empty.style.display='block'; return; }
empty.style.display='none';
const sorted=visible.slice().sort(function(a,b){
if(a.done!==b.done) return a.done?1:-1;
return new Date(a.deadDate||a.workDate||'9999')-new Date(b.deadDate||b.workDate||'9999');
});
tb.innerHTML=sorted.map(function(item){
const ri=items.indexOf(item);
const d=dday(item.deadDate||item.workDate);
const dc=item.done?'':ddClass(d);
const dl=item.done?'<span style="font-size:11px;color:#aaa">완료</span>':'<span class="'+dc+'">'+ddLabel(d)+'</span>';
return '<tr class="'+(item.done?'done-row':'')+'">'+
'<td class="ref-cell">'+(item.ref||'-')+'</td>'+
'<td>'+typeBadge(item.type)+'</td>'+
'<td style="font-size:12px;color:#888">'+fmtDate(item.workDate)+'</td>'+
'<td style="font-size:12px;color:#888">'+fmtDate(item.deadDate)+'</td>'+
'<td style="font-size:11px;color:#aaa">'+(item.ext||'')+'</td>'+
'<td style="font-size:12px">'+(item.person||'-')+'</td>'+
'<td>'+dl+'</td>'+
'<td><span class="badge '+(item.done?'b-gray':'b-blue')+'">'+(item.done?'완료':'진행중')+'</span></td>'+
'<td style="display:flex;gap:4px;align-items:center">'+
(!item.done?'<button class="action-btn" onclick="markDone('+ri+')">완료</button>':'')+
'<button class="del-btn" onclick="deleteItem('+ri+')">&times;</button>'+
'</td></tr>';
}).join('');
}
function openModal(){
['f-ref','f-ext','f-person'].forEach(function(id){ document.getElementById(id).value=''; });
const t=new Date(); t.setDate(t.getDate()+30);
const ds=t.toISOString().slice(0,10);
document.getElementById('f-work').value=ds;
document.getElementById('f-dead').value=ds;
document.getElementById('modal-bg').classList.add('open');
}
function closeModal(){ document.getElementById('modal-bg').classList.remove('open'); }
async function addItem(){
const dead=document.getElementById('f-dead').value;
if(!dead){ alert('마감일은 필수입니다.'); return; }
items.push({
ref:document.getElementById('f-ref').value.trim(),
type:document.getElementById('f-type').value,
workDate:document.getElementById('f-work').value||'',
deadDate:dead,
ext:document.getElementById('f-ext').value.trim(),
person:document.getElementById('f-person').value.trim(),
done:false
});
closeModal(); render();
await pushToSheet();
showToast('추가하고 저장했어요');
}
async function markDone(i){
items[i].done=true; render();
await pushToSheet();
showToast('완료 처리했어요');
}
async function deleteItem(i){
if(confirm('삭제할까요?')){
items.splice(i,1); render();
await pushToSheet();
showToast('삭제했어요');
}
}
function setFilter(el){
document.querySelectorAll('.chip').forEach(function(c){ c.classList.remove('active'); });
el.classList.add('active'); filter=el.dataset.f; render();
}
document.getElementById('modal-bg').addEventListener('click',function(e){ if(e.target===this) closeModal(); });
syncFromSheet();
</script>
</body>
</html>
