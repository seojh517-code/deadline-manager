<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="기한관리">
<title>기한 관리</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;background:#f5f5f5;color:#1a1a1a;min-height:100vh}
.wrap{max-width:960px;margin:0 auto;padding:1.25rem 1rem}
.top{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:10px}
h2{font-size:20px;font-weight:600;color:#1a1a1a}
.sub{font-size:12px;color:#888;margin-left:8px;font-weight:400}
.btn{background:#fff;border:1px solid #ddd;border-radius:8px;padding:7px 14px;font-size:13px;cursor:pointer;color:#1a1a1a}
.btn:hover{background:#f5f5f5}
.btn:active{transform:scale(0.98)}
.btn-primary{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.btn-primary:hover{background:#333}
.btn-danger{background:#E24B4A;color:#fff;border-color:#E24B4A}
.btn-danger:hover{background:#c03a39}
.btn-sync{background:#fff;border:1px solid #1D9E75;color:#1D9E75;border-radius:8px;padding:7px 14px;font-size:13px;cursor:pointer}
.btn-sync:hover{background:#E1F5EE}
.btn-sync:disabled{opacity:0.4;cursor:not-allowed}
.sync-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.sync-status{font-size:12px;color:#888;display:flex;align-items:center;gap:5px}
.dot{width:7px;height:7px;border-radius:50%;background:#ccc;display:inline-block;flex-shrink:0}
.dot.ok{background:#1D9E75}.dot.err{background:#E24B4A}.dot.loading{background:#BA7517;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:1.25rem}
.stat{background:#fff;border-radius:10px;padding:1rem;text-align:center;border:1px solid #eee}
.stat-label{font-size:11px;color:#888;margin-bottom:4px}
.stat-num{font-size:24px;font-weight:600}
.c-red{color:#E24B4A}.c-amber{color:#BA7517}.c-blue{color:#185FA5}.c-gray{color:#aaa}
.filters{display:flex;gap:6px;margin-bottom:1rem;flex-wrap:wrap;align-items:center}
.chip{padding:5px 12px;border-radius:20px;font-size:12px;border:1px solid #ddd;cursor:pointer;background:#fff;color:#666}
.chip.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.search{padding:7px 11px;border:1px solid #ddd;border-radius:8px;font-size:13px;background:#fff;color:#1a1a1a;width:190px}
.search:focus{outline:none;border-color:#888}
.table-wrap{background:#fff;border-radius:12px;border:1px solid #eee;overflow:hidden;overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:680px}
thead th{text-align:left;padding:10px 12px;font-weight:500;font-size:11px;color:#888;border-bottom:1px solid #eee;background:#fafafa;white-space:nowrap}
tbody tr{border-bottom:1px solid #f0f0f0}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:#fafafa}
td{padding:11px 12px;vertical-align:middle}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap}
.b-red{background:#FCEBEB;color:#A32D2D}
.b-amber{background:#FAEEDA;color:#854F0B}
.b-blue{background:#E6F1FB;color:#185FA5}
.b-green{background:#EAF3DE;color:#3B6D11}
.b-purple{background:#EEEDFE;color:#3C3489}
.b-gray{background:#F1EFE8;color:#5F5E5A}
.b-teal{background:#E1F5EE;color:#0F6E56}
.b-pink{background:#FDE8F4;color:#9C2C6D}
.b-orange{background:#FEF0E0;color:#954800}
.d-red{color:#E24B4A;font-weight:600}
.d-amber{color:#BA7517;font-weight:600}
.done-row{opacity:0.38}

/* 상태 버튼 */
.status-btn{
  display:inline-flex;align-items:center;gap:4px;
  padding:3px 9px;border-radius:20px;font-size:11px;font-weight:500;
  border:1px solid transparent;cursor:pointer;white-space:nowrap;
  transition:filter 0.15s;position:relative;
}
.status-btn:hover{filter:brightness(0.93)}
.status-btn .arrow{font-size:9px;opacity:0.6}
.s-진행중{background:#E6F1FB;color:#185FA5;border-color:#B5D4F4}
.s-초안완{background:#EAF3DE;color:#3B6D11;border-color:#C0DD97}
.s-수정중{background:#FAEEDA;color:#854F0B;border-color:#FAC775}
.s-수정완{background:#EEEDFE;color:#3C3489;border-color:#CECBF6}
.s-완료{background:#F1EFE8;color:#5F5E5A;border-color:#D3D1C7}

/* 상태 드롭다운 */
.status-dropdown{
  position:fixed;z-index:9999;
  background:#fff;border:1px solid #ddd;border-radius:10px;
  box-shadow:0 4px 16px rgba(0,0,0,0.12);
  min-width:110px;overflow:hidden;
}
.status-dropdown button{
  display:block;width:100%;text-align:left;
  padding:8px 12px;font-size:12px;border:none;background:transparent;cursor:pointer;color:#1a1a1a;
}
.status-dropdown button:hover{background:#f5f5f5}
.status-dropdown button.active-item{font-weight:600}
.status-dropdown .divider{height:1px;background:#f0f0f0;margin:2px 0}

.ref-cell{font-family:'SF Mono',Menlo,monospace;font-size:11px;color:#185FA5;cursor:pointer;text-decoration:underline;text-decoration-color:transparent;transition:text-decoration-color 0.15s}
.ref-cell:hover{text-decoration-color:#185FA5}
.empty{text-align:center;padding:3.5rem;color:#aaa;font-size:14px}
thead th.sortable{cursor:pointer;user-select:none}
thead th.sortable:hover{color:#555;background:#efefef}
thead th.sort-active{color:#1a1a1a}
.sort-icon{margin-left:3px;font-size:10px;opacity:0.35}
thead th.sort-active .sort-icon{opacity:0.85}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:100;align-items:center;justify-content:center;padding:1rem}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:16px;padding:1.5rem;width:440px;max-width:100%;border:1px solid #eee;max-height:90vh;overflow-y:auto}
.modal h3{font-size:17px;font-weight:600;margin-bottom:1.1rem}
.form-row{margin-bottom:12px}
.form-row label{display:block;font-size:12px;color:#666;margin-bottom:4px;font-weight:500}
.form-row input,.form-row select{width:100%;padding:9px 11px;border:1px solid #ddd;border-radius:8px;font-size:14px;background:#fff;color:#1a1a1a;-webkit-appearance:none}
.form-row input:focus,.form-row select:focus{outline:none;border-color:#888}
.modal-btns-left{display:flex;gap:8px;justify-content:space-between;margin-top:1rem}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:11px 22px;border-radius:10px;font-size:13px;z-index:400;opacity:0;transition:opacity 0.25s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
@media(max-width:600px){
  .stats{grid-template-columns:repeat(2,1fr)}
  .search{width:130px}
  h2{font-size:17px}
  .table-wrap{overflow-x:visible}
  table{min-width:unset}
  thead{display:none}
  tbody tr{
    display:grid;
    grid-template-columns:1fr auto auto;
    grid-template-rows:auto auto auto;
    padding:10px 12px;
    column-gap:8px;
    row-gap:4px;
    border-bottom:1px solid #f0f0f0;
  }
  tbody tr:last-child{border-bottom:none}
  td{padding:0;vertical-align:unset}
  td:nth-child(1){grid-row:2;grid-column:1/-1}
  td:nth-child(2){grid-row:1;grid-column:1}
  td:nth-child(3){display:none}
  td:nth-child(4){grid-row:3;grid-column:1;font-size:12px;color:#888}
  td:nth-child(5){display:none}
  td:nth-child(6){grid-row:3;grid-column:2/-1;text-align:right;font-size:12px}
  td:nth-child(7){grid-row:1;grid-column:2;text-align:right}
  td:nth-child(8){grid-row:1;grid-column:3}
}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div style="display:flex;align-items:baseline">
      <h2>기한 관리<span class="sub" id="date-sub"></span></h2>
    </div>
    <div class="sync-row">
      <div class="sync-status"><span class="dot loading" id="sync-dot"></span><span id="sync-label">연결 중...</span></div>
      <button class="btn-sync" id="sync-btn" onclick="syncFromSheet()" disabled>새로고침</button>
      <button class="btn btn-danger" onclick="openDeleteDoneModal()">완료삭제</button>
      <button class="btn btn-primary" onclick="openModal(-1)">+ 추가</button>
    </div>
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-label">D-7 이내</div><div class="stat-num c-red" id="s-urgent">0</div></div>
    <div class="stat"><div class="stat-label">D-30 이내</div><div class="stat-num c-amber" id="s-soon">0</div></div>
    <div class="stat"><div class="stat-label">전체 진행중</div><div class="stat-num c-blue" id="s-total">0</div></div>
    <div class="stat"><div class="stat-label">완료</div><div class="stat-num c-gray" id="s-done">0</div></div>
  </div>

  <div class="filters">
    <button class="chip active" data-f="전체" onclick="setFilter(this)">전체</button>
    <button class="chip" data-f="국내신건" onclick="setFilter(this)">국내신건</button>
    <button class="chip" data-f="국내OA" onclick="setFilter(this)">국내OA</button>
    <button class="chip" data-f="국내등록검토" onclick="setFilter(this)">국내등록검토</button>
    <button class="chip" data-f="국내분할" onclick="setFilter(this)">국내분할</button>
    <button class="chip" data-f="국내자진보정" onclick="setFilter(this)">국내자진보정</button>
    <button class="chip" data-f="해외OA" onclick="setFilter(this)">해외OA</button>
    <button class="chip" data-f="해외등록검토" onclick="setFilter(this)">해외등록검토</button>
    <button class="chip" data-f="해외출원" onclick="setFilter(this)">해외출원</button>
    <button class="chip" data-f="해외분할" onclick="setFilter(this)">해외분할</button>
    <button class="chip" data-f="해외자진보정" onclick="setFilter(this)">해외자진보정</button>
    <input class="search" id="search" placeholder="REF 또는 담당자 검색..." oninput="render()">
  </div>

  <div class="table-wrap">
    <table>
      <thead><tr>
        <th class="sortable" id="th-ref" onclick="setSortCol('ref')">LGE REF <span class="sort-icon">↕</span></th>
        <th class="sortable" id="th-type" onclick="setSortCol('type')">업무유형 <span class="sort-icon">↕</span></th>
        <th class="sortable" id="th-workDate" onclick="setSortCol('workDate')">업무기한 <span class="sort-icon">↕</span></th>
        <th class="sortable" id="th-deadDate" onclick="setSortCol('deadDate')">마감일 <span class="sort-icon">↕</span></th>
        <th>연장</th>
        <th class="sortable" id="th-person" onclick="setSortCol('person')">담당자 <span class="sort-icon">↕</span></th>
        <th class="sortable" id="th-dday" onclick="setSortCol('dday')">D-day <span class="sort-icon">↕</span></th>
        <th class="sortable" id="th-status" onclick="setSortCol('status')">상태 <span class="sort-icon">↕</span></th>
      </tr></thead>
      <tbody id="tbody"></tbody>
    </table>
    <div id="empty" class="empty" style="display:none">항목이 없습니다.</div>
  </div>
</div>

<!-- Add / Edit Modal -->
<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <h3 id="modal-title">기한 추가</h3>
    <div class="form-row"><label>LGE REF</label><input id="f-ref" placeholder="예: 19LWW255KR01"></div>
    <div class="form-row"><label>업무유형</label>
      <select id="f-type">
        <option value="국내신건">국내신건</option>
        <option value="국내OA">국내OA</option>
        <option value="국내등록검토">국내등록검토</option>
        <option value="국내분할">국내분할</option>
        <option value="국내자진보정">국내자진보정</option>
        <option value="해외OA">해외OA</option>
        <option value="해외등록검토">해외등록검토</option>
        <option value="해외출원">해외출원</option>
        <option value="해외분할">해외분할</option>
        <option value="해외자진보정">해외자진보정</option>
      </select>
    </div>
    <div class="form-row"><label>업무기한</label><input type="date" id="f-work"></div>
    <div class="form-row"><label>마감일 (법정기한)</label><input type="date" id="f-dead"></div>
    <div class="form-row"><label>연장</label><input id="f-ext" placeholder="예: 2개월"></div>
    <div class="form-row"><label>담당자</label><input id="f-person" placeholder="예: 손구영 책임님"></div>
    <div class="modal-btns-left">
      <div>
        <button class="btn btn-danger" id="modal-del-btn" onclick="deleteFromModal()" style="display:none">삭제</button>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn" onclick="closeModal()">취소</button>
        <button class="btn btn-primary" id="modal-save-btn" onclick="saveItem()">추가</button>
      </div>
    </div>
  </div>
</div>

<!-- Delete Done Modal -->
<div class="modal-bg" id="delete-done-bg">
  <div class="modal" style="max-width:340px;text-align:center">
    <p style="font-size:16px;font-weight:600;margin-bottom:8px">완료 사건 전체 삭제</p>
    <p style="font-size:14px;color:#666;margin-bottom:1.5rem">완료 사건 전체를 삭제할까요?</p>
    <div style="display:flex;gap:8px;justify-content:center">
      <button class="btn" onclick="closeDeleteDoneModal()">취소</button>
      <button class="btn btn-danger" onclick="confirmDeleteDone()">삭제</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

let items = [];
let filter = '전체';
let editIndex = -1;
let openDropdownIdx = -1;
let sortCol = 'deadDate';
let sortDir = 'asc';

/* ── 날짜 헬퍼 ── */
function getDateSubtitle() {
  const now = new Date();
  return String(now.getFullYear()).slice(2)+'년 '+(now.getMonth()+1)+'월 '+now.getDate()+'일 기준';
}
function currentYM() {
  const d = new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
}
function today() { const d=new Date(); d.setHours(0,0,0,0); return d; }
function dday(ds) {
  if(!ds) return null;
  const t=today(), tgt=new Date(ds); tgt.setHours(0,0,0,0);
  return Math.round((tgt-t)/86400000);
}
function ddLabel(d) { if(d===null) return '-'; if(d<0) return 'D+'+Math.abs(d); if(d===0) return 'D-day'; return 'D-'+d; }
function ddClass(d) { if(d===null||d<0) return ''; if(d<=7) return 'd-red'; if(d<=30) return 'd-amber'; return ''; }
function fmtDate(ds) {
  if(!ds) return '-';
  try { const d=new Date(ds); return (d.getMonth()+1)+'월 '+d.getDate()+'일'; } catch(e){ return ds; }
}
function isoDate(ds) {
  if(!ds) return '';
  if(ds.length===10) return ds;
  try {
    const d=new Date(ds);
    const kst=new Date(d.getTime()+9*3600000);
    return kst.toISOString().slice(0,10);
  } catch(e){ return ds.slice(0,10); }
}

/* ── 상태 정보 ── */
function statusClass(s) {
  const m={'진행중':'s-진행중','초안완':'s-초안완','수정중':'s-수정중','수정완':'s-수정완','완료':'s-완료'};
  return m[s]||'s-진행중';
}
function isDone(item) { return item.status==='완료'; }

/* ── 배지 ── */
function typeBadge(t) {
  const m={'국내신건':'b-blue','국내OA':'b-red','국내등록검토':'b-purple','국내분할':'b-gray','국내자진보정':'b-green','해외OA':'b-amber','해외등록검토':'b-pink','해외출원':'b-teal','해외분할':'b-gray','해외자진보정':'b-green'};
  return '<span class="badge '+(m[t]||'b-gray')+'">'+t+'</span>';
}

/* ── 토스트 ── */
function showToast(msg) {
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  setTimeout(function(){ el.classList.remove('show'); },2500);
}

/* ── 동기화 상태 ── */
function setStatus(state, msg) {
  document.getElementById('sync-dot').className='dot '+state;
  document.getElementById('sync-label').textContent=msg;
  document.getElementById('sync-btn').disabled=(state==='loading');
}

/* ── Google Sheets ── */
async function syncFromSheet() {
  setStatus('loading','불러오는 중...');
  try {
    const res=await fetch(GAS_URL+'?action=getAll');
    const data=await res.json();
    if(data.error) throw new Error(data.error);
    if(data.items&&data.items.length>0) {
      items=data.items.map(function(r){
        // 기존 done 필드 → status 필드로 마이그레이션
        let status=r.status||'';
        if(!status) {
          status=(r.done==='TRUE'||r.done===true||r.done==='true')?'완료':'진행중';
        }
        return {
          ref:r.ref||'', type:r.type||'국내OA',
          workDate:isoDate(r.workDate||''), deadDate:isoDate(r.deadDate||''),
          ext:r.ext||'', person:r.person||'',
          status:status, doneDate:r.doneDate||''
        };
      });
      setStatus('ok','구글 시트 연동됨');
      showToast('시트에서 '+items.length+'건 불러왔어요');
    } else {
      setStatus('ok','구글 시트 연동됨');
      showToast('데이터가 없어요. + 추가로 입력해주세요');
    }
    render();
  } catch(e) {
    setStatus('err','연동 실패');
    items=[];
    render();
    showToast('시트 연결 실패. 새로고침을 눌러 다시 시도해주세요.');
  }
}

async function pushToSheet() {
  setStatus('loading','저장 중...');
  try {
    const res=await fetch(GAS_URL,{
      method:'POST',
      headers:{'Content-Type':'text/plain'},
      body:JSON.stringify({action:'save',data:items})
    });
    const data=await res.json();
    if(data.error) throw new Error(data.error);
    setStatus('ok','구글 시트 연동됨');
  } catch(e) {
    setStatus('err','저장 실패');
    showToast('저장 실패. 다시 시도해주세요.');
  }
}

/* ── 드롭다운 ── */
function closeDropdown() {
  document.querySelectorAll('.status-dropdown').forEach(function(el){ el.remove(); });
  openDropdownIdx=-1;
}

function toggleDropdown(idx, btnEl) {
  if(openDropdownIdx===idx) { closeDropdown(); return; }
  closeDropdown();
  openDropdownIdx=idx;

  const item=items[idx];
  const curStatus=item.status||'진행중';
  const choices=curStatus==='완료'?STATUS_ACTIVE:STATUS_LIST;

  const dd=document.createElement('div');
  dd.className='status-dropdown';

  choices.forEach(function(s){
    if(s===curStatus) return;
    const btn=document.createElement('button');
    btn.textContent=s;
    btn.onclick=function(e){
      e.stopPropagation();
      changeStatus(idx,s);
      closeDropdown();
    };
    dd.appendChild(btn);
  });

  // body에 붙이고 버튼 위치 기준으로 좌표 계산
  document.body.appendChild(dd);
  const rect=btnEl.getBoundingClientRect();
  const ddH=dd.offsetHeight;
  const spaceBelow=window.innerHeight-rect.bottom;
  const top=spaceBelow>ddH+8 ? rect.bottom+4 : rect.top-ddH-4;
  dd.style.top=top+'px';
  dd.style.left=rect.left+'px';

  setTimeout(function(){
    document.addEventListener('click', closeDropdown, {once:true});
  },0);
}

async function changeStatus(idx, newStatus) {
  items[idx].status=newStatus;
  if(newStatus==='완료') {
    items[idx].doneDate=currentYM();
  } else {
    items[idx].doneDate='';
  }
  render();
  await pushToSheet();
  showToast('"'+newStatus+'" 상태로 변경했어요');
}

/* ── 정렬 ── */
function setSortCol(col) {
  if(sortCol===col) { sortDir=sortDir==='asc'?'desc':'asc'; }
  else { sortCol=col; sortDir='asc'; }
  render();
}

/* ── 렌더링 ── */
function render() {
  const q=(document.getElementById('search').value||'').toLowerCase();
  let visible=filter==='전체'?items.slice():items.filter(function(i){ return i.type===filter; });
  if(q) visible=visible.filter(function(i){ return (i.ref||'').toLowerCase().includes(q)||(i.person||'').toLowerCase().includes(q); });

  const scoped=filter==='전체'?items:items.filter(function(i){ return i.type===filter; });
  const active=scoped.filter(function(i){ return !isDone(i); });
  document.getElementById('s-urgent').textContent=active.filter(function(i){ const d=dday(i.deadDate||i.workDate); return d!==null&&d>=0&&d<=7; }).length;
  document.getElementById('s-soon').textContent=active.filter(function(i){ const d=dday(i.deadDate||i.workDate); return d!==null&&d>=0&&d<=30; }).length;
  document.getElementById('s-total').textContent=active.length;
  document.getElementById('s-done').textContent=scoped.filter(function(i){ return isDone(i); }).length;

  // 헤더 정렬 아이콘 업데이트
  document.querySelectorAll('thead th').forEach(function(th){ th.classList.remove('sort-active'); var ic=th.querySelector('.sort-icon'); if(ic) ic.textContent='↕'; });
  var activeTh=document.getElementById('th-'+sortCol);
  if(activeTh){ activeTh.classList.add('sort-active'); var ic=activeTh.querySelector('.sort-icon'); if(ic) ic.textContent=sortDir==='asc'?'↑':'↓'; }

  const empty=document.getElementById('empty'), tb=document.getElementById('tbody');
  if(visible.length===0){ tb.innerHTML=''; empty.style.display='block'; return; }
  empty.style.display='none';

  const sorted=visible.slice().sort(function(a,b){
    if(isDone(a)!==isDone(b)) return isDone(a)?1:-1;
    var va,vb;
    if(sortCol==='dday'){
      va=dday(a.deadDate||a.workDate); vb=dday(b.deadDate||b.workDate);
      if(va===null) va=9999; if(vb===null) vb=9999;
    } else if(sortCol==='status'){
      va=STATUS_LIST.indexOf(a.status||'진행중'); vb=STATUS_LIST.indexOf(b.status||'진행중');
    } else if(sortCol==='workDate'||sortCol==='deadDate'){
      va=a[sortCol]||'9999'; vb=b[sortCol]||'9999';
    } else {
      va=(a[sortCol]||'').toLowerCase(); vb=(b[sortCol]||'').toLowerCase();
    }
    if(va<vb) return sortDir==='asc'?-1:1;
    if(va>vb) return sortDir==='asc'?1:-1;
    return 0;
  });

  tb.innerHTML=sorted.map(function(item){
    const ri=items.indexOf(item);
    const d=dday(item.deadDate||item.workDate);
    const dc=isDone(item)?'':ddClass(d);
    const dl=isDone(item)?'<span style="font-size:11px;color:#aaa">-</span>':'<span class="'+dc+'">'+ddLabel(d)+'</span>';
    const status=item.status||'진행중';
    const statusBtn='<button class="status-btn '+statusClass(status)+'" onclick="toggleDropdown('+ri+', this); event.stopPropagation()">'+
      status+' <span class="arrow">▾</span>'+
    '</button>';
    return '<tr class="'+(isDone(item)?'done-row':'')+'">'+
      '<td class="ref-cell" onclick="openModal('+ri+')">'+(item.ref||'-')+'</td>'+
      '<td>'+typeBadge(item.type)+'</td>'+
      '<td style="font-size:12px;color:#888">'+fmtDate(item.workDate)+'</td>'+
      '<td style="font-size:12px;color:#888">'+fmtDate(item.deadDate)+'</td>'+
      '<td style="font-size:11px;color:#aaa">'+(item.ext||'')+'</td>'+
      '<td style="font-size:12px">'+(item.person||'-')+'</td>'+
      '<td>'+dl+'</td>'+
      '<td>'+statusBtn+'</td>'+
    '</tr>';
  }).join('');
}

/* ── 모달 ── */
function openModal(idx) {
  closeDropdown();
  editIndex=idx;
  const isEdit=idx>=0;
  document.getElementById('modal-title').textContent=isEdit?'사건 수정':'기한 추가';
  document.getElementById('modal-save-btn').textContent=isEdit?'저장':'추가';
  document.getElementById('modal-del-btn').style.display=isEdit?'inline-block':'none';

  if(isEdit) {
    const item=items[idx];
    document.getElementById('f-ref').value=item.ref||'';
    document.getElementById('f-type').value=item.type||'국내OA';
    document.getElementById('f-work').value=item.workDate||'';
    document.getElementById('f-dead').value=item.deadDate||'';
    document.getElementById('f-ext').value=item.ext||'';
    document.getElementById('f-person').value=item.person||'';
  } else {
    ['f-ref','f-ext','f-person'].forEach(function(id){ document.getElementById(id).value=''; });
    const t=new Date(); t.setDate(t.getDate()+30);
    const ds=t.toISOString().slice(0,10);
    document.getElementById('f-work').value=ds;
    document.getElementById('f-dead').value=ds;
    document.getElementById('f-type').value='국내OA';
  }
  document.getElementById('modal-bg').classList.add('open');
  setTimeout(function(){ document.getElementById('f-ref').focus(); },100);
}

function closeModal(){ document.getElementById('modal-bg').classList.remove('open'); }

async function saveItem() {
  const dead=document.getElementById('f-dead').value;
  if(!dead){ alert('마감일은 필수입니다.'); return; }
  const newItem={
    ref:document.getElementById('f-ref').value.trim(),
    type:document.getElementById('f-type').value,
    workDate:document.getElementById('f-work').value||'',
    deadDate:dead,
    ext:document.getElementById('f-ext').value.trim(),
    person:document.getElementById('f-person').value.trim(),
    status:editIndex>=0?(items[editIndex].status||'진행중'):'진행중',
    doneDate:editIndex>=0?(items[editIndex].doneDate||''):''
  };
  if(editIndex>=0) {
    items[editIndex]=newItem;
    closeModal(); render();
    await pushToSheet();
    showToast('수정하고 저장했어요');
  } else {
    items.push(newItem);
    closeModal(); render();
    await pushToSheet();
    showToast('추가하고 저장했어요');
  }
}

async function deleteFromModal() {
  if(editIndex<0) return;
  if(confirm('이 사건을 삭제할까요?')) {
    items.splice(editIndex,1);
    closeModal(); render();
    await pushToSheet();
    showToast('삭제했어요');
  }
}


/* ── 완료 사건 삭제 모달 ── */
function openDeleteDoneModal() {
  const doneCount = items.filter(function(i){ return isDone(i); }).length;
  if(doneCount === 0) { showToast('삭제할 완료 사건이 없어요'); return; }
  document.getElementById('delete-done-bg').classList.add('open');
}
function closeDeleteDoneModal() {
  document.getElementById('delete-done-bg').classList.remove('open');
}
async function confirmDeleteDone() {
  const before = items.length;
  items = items.filter(function(i){ return !isDone(i); });
  const removed = before - items.length;
  closeDeleteDoneModal();
  render();
  await pushToSheet();
  showToast('완료 사건 ' + removed + '건을 삭제했어요');
}

function setFilter(el) {
  document.querySelectorAll('.chip').forEach(function(c){ c.classList.remove('active'); });
  el.classList.add('active'); filter=el.dataset.f; render();
}

/* ── 초기화 ── */
document.getElementById('date-sub').textContent=getDateSubtitle();
document.getElementById('modal-bg').addEventListener('click',function(e){ if(e.target===this) closeModal(); });
document.getElementById('delete-done-bg').addEventListener('click',function(e){ if(e.target===this) closeDeleteDoneModal(); });
syncFromSheet();
</script>
